version: '3.8'

services:
  db:
    image: postgres:latest
    env_file: .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "${POSTGRES_PORT}:5432"
    restart: unless-stopped

  adminer:
    image: adminer:latest
    ports:
      - "${ADMINER_PORT}:8080"
    restart: unless-stopped
    depends_on:
      - db

volumes:
  postgres_data:
