fluxnova:
  bpm:
    job-execution:
      enabled: false
    metrics:
      enabled: false

# Keep Camunda-compatible aliases as a fallback in case FluxNova still binds these keys.
camunda:
  bpm:
    job-execution:
      enabled: false
    metrics:
      enabled: false

storage:
  local-root: ./build/test-uploads

spring:
  servlet:
    multipart:
      max-file-size: 200KB
      max-request-size: 200KB

documenttemplates:
  upload:
    max-size-bytes: 100000
