fluxnova:
  bpm:
    metrics:
      enabled: false

auth:
  bootstrap:
    enabled: true
    username: admin
    email: admin@local.invalid
    password: AdminPass123!

# Keep Camunda-compatible aliases as a fallback in case FluxNova still binds these keys.
camunda:
  bpm:
    metrics:
      enabled: false

storage:
  local-root: ./build/test-uploads

spring:
  servlet:
    multipart:
      max-file-size: 2KB
      max-request-size: 2KB

documenttemplates:
  upload:
    max-size-bytes: 1024
