spring:
  application:
    name: sandbox
  mvc:
    problemdetails:
      enabled: true
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:sandboxdb}
    username: ${POSTGRES_USER:sandbox}
    password: ${POSTGRES_PASSWORD:sandboxpass}
    driver-class-name: org.postgresql.Driver

forms:
  storage:
    local-root: ${FORMS_STORAGE_LOCAL_ROOT:./uploads/forms}
